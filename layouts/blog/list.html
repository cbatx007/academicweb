{{ define "main" }}
<section class="page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>
  <div class="stack">
    {{ range .Pages.ByDate.Reverse }}
      <article class="list-item">
        <p class="meta">{{ .Date.Format "2 January 2006" }}</p>
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
